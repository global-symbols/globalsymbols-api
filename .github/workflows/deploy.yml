name: Deploy (CI build + upload)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    env:
      # Pre-production host remains a GitHub secret; the stable non-secret deployment
      # settings are committed here to keep GitHub repo settings minimal.
      PREPRODUCTION_SSH_HOST: ${{ secrets.PREPRODUCTION_SSH_HOST }}
      PREPRODUCTION_SSH_USER: gs-api-deploy
      PREPRODUCTION_UPLOAD_DIR: /var/www/globalsymbols-api/uploads
      PREPRODUCTION_INSTALL_DIR: /var/www/globalsymbols-api
      PREPRODUCTION_SERVICE_NAME: globalsymbols-api.service
      PREPRODUCTION_ENV_FILE: /var/www/globalsymbols-api/.env
      PREPRODUCTION_DEPLOY_ENABLED: ${{ vars.PREPRODUCTION_DEPLOY_ENABLED }}

      # Production host remains a GitHub secret; the stable non-secret deployment
      # settings are committed here to keep GitHub repo settings minimal.
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USER: gs-api-deploy
      PRODUCTION_UPLOAD_DIR: /var/www/globalsymbols-api/uploads
      PRODUCTION_INSTALL_DIR: /var/www/globalsymbols-api
      PRODUCTION_SERVICE_NAME: globalsymbols-api.service
      PRODUCTION_ENV_FILE: /var/www/globalsymbols-api/.env
      PRODUCTION_DEPLOY_ENABLED: ${{ vars.PRODUCTION_DEPLOY_ENABLED }}

      # Shared secrets
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      PREPRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PREPRODUCTION_SSH_KNOWN_HOSTS }}
      PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Use the repo's Go version if declared; otherwise actions/setup-go will fall back safely.
          go-version-file: go.mod
          cache: true

      - name: Fail fast on missing required secrets
        shell: bash
        run: |
          set -euo pipefail

          require_non_empty() {
            local name="$1"
            local value="${!name:-}"
            if [[ -z "${value}" ]]; then
              echo "::error::Required ${name} is missing or empty."
              exit 1
            fi
          }

          # Shared
          require_non_empty "DEPLOY_SSH_PRIVATE_KEY"

          if [[ "${PREPRODUCTION_DEPLOY_ENABLED:-true}" != "false" ]]; then
            require_non_empty "PREPRODUCTION_SSH_HOST"
            require_non_empty "PREPRODUCTION_SSH_KNOWN_HOSTS"
          fi

          if [[ "${PRODUCTION_DEPLOY_ENABLED:-true}" != "false" ]]; then
            require_non_empty "PRODUCTION_SSH_HOST"
            require_non_empty "PRODUCTION_SSH_KNOWN_HOSTS"
          fi

      - name: Show selected deployment targets
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${PREPRODUCTION_DEPLOY_ENABLED:-true}" == "false" ]]; then
            echo "Pre-production upload: disabled"
          else
            echo "Pre-production upload: enabled"
          fi

          if [[ "${PRODUCTION_DEPLOY_ENABLED:-true}" == "false" ]]; then
            echo "Production upload: disabled"
          else
            echo "Production upload: enabled"
          fi

      - name: Compute release identifier
        shell: bash
        run: |
          set -euo pipefail

          release_timestamp="$(date -u +"%Y%m%d-%H%M%S")"
          short_sha="${GITHUB_SHA:0:7}"
          release_id="${release_timestamp}-${short_sha}"

          echo "RELEASE_ID=${release_id}" >> "${GITHUB_ENV}"
          echo "Using RELEASE_ID=${release_id}"

      - name: Minimal build verification (tests)
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      - name: Build Go API (linux/amd64)
        shell: bash
        run: |
          set -euo pipefail

          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=amd64

          mkdir -p "package/${RELEASE_ID}/bin"
          go build -o "package/${RELEASE_ID}/bin/go-api" ./cmd/api

      - name: Package release artifact (predictable layout)
        shell: bash
        run: |
          set -euo pipefail

          # Expected release layout (see Task 1):
          #   <RELEASE_ID>/
          #     bin/go-api
          #     scripts/install_release.sh
          #     metadata/commit_sha.txt
          #     metadata/built_at_utc.txt
          mkdir -p "package/${RELEASE_ID}/scripts" "package/${RELEASE_ID}/metadata"

          # Copy the server-side install script into the release so operators use the
          # installer version that matches the uploaded artifact.
          if [[ ! -f "scripts/deploy/install_release.sh" ]]; then
            echo "::error::Missing scripts/deploy/install_release.sh (required for packaging into scripts/install_release.sh)."
            exit 1
          fi

          cp "scripts/deploy/install_release.sh" "package/${RELEASE_ID}/scripts/install_release.sh"
          chmod +x "package/${RELEASE_ID}/scripts/install_release.sh"

          echo "${GITHUB_SHA}" > "package/${RELEASE_ID}/metadata/commit_sha.txt"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > "package/${RELEASE_ID}/metadata/built_at_utc.txt"

      - name: Upload to pre-production (CI copy only)
        if: ${{ vars.PREPRODUCTION_DEPLOY_ENABLED != 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          printf "%s\n" "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          printf "%s\n" "${PREPRODUCTION_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/deploy_known_hosts"

          ssh_opts=(
            -i "${HOME}/.ssh/deploy_key"
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${HOME}/.ssh/deploy_known_hosts"
          )

          target_dir="${PREPRODUCTION_UPLOAD_DIR%/}/${RELEASE_ID}"
          ssh "${ssh_opts[@]}" "${PREPRODUCTION_SSH_USER}@${PREPRODUCTION_SSH_HOST}" \
            "mkdir -p '${target_dir}'"

          scp -r "${ssh_opts[@]}" "package/${RELEASE_ID}/"* \
            "${PREPRODUCTION_SSH_USER}@${PREPRODUCTION_SSH_HOST}:${target_dir}/"

          echo "Pre-production artifact copied to: ${target_dir}/"

      - name: Upload to production (CI copy only)
        if: ${{ vars.PRODUCTION_DEPLOY_ENABLED != 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.ssh"
          printf "%s\n" "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          printf "%s\n" "${PRODUCTION_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/deploy_known_hosts"

          production_host="$(printf "%s" "${PRODUCTION_SSH_HOST}" | tr -d '\r\n')"

          echo "known_hosts line count:"
          wc -l "${HOME}/.ssh/deploy_known_hosts"

          echo "production host visible formatting:"
          printf '<%s>\n' "${production_host}" | sed -n 'l'

          echo "production host lookup:"
          ssh-keygen -F "${production_host}" -f "${HOME}/.ssh/deploy_known_hosts" || true

          echo "visible known_hosts formatting:"
          sed -n 'l' "${HOME}/.ssh/deploy_known_hosts"

          ssh_opts=(
            -i "${HOME}/.ssh/deploy_key"
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${HOME}/.ssh/deploy_known_hosts"
          )

          target_dir="${PRODUCTION_UPLOAD_DIR%/}/${RELEASE_ID}"
          ssh "${ssh_opts[@]}" "${PRODUCTION_SSH_USER}@${production_host}" \
            "mkdir -p '${target_dir}'"

          scp -r "${ssh_opts[@]}" "package/${RELEASE_ID}/"* \
            "${PRODUCTION_SSH_USER}@${production_host}:${target_dir}/"

          echo "Production artifact copied to: ${target_dir}/"

      - name: Artifact copy locations (for task 3)
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${PREPRODUCTION_DEPLOY_ENABLED:-true}" == "false" ]]; then
            echo "Pre-production upload skipped."
          else
            echo "Pre-production upload dir for this release:"
            echo "${PREPRODUCTION_UPLOAD_DIR%/}/${RELEASE_ID}/"
          fi

          echo

          if [[ "${PRODUCTION_DEPLOY_ENABLED:-true}" == "false" ]]; then
            echo "Production upload skipped."
          else
            echo "Production upload dir for this release:"
            echo "${PRODUCTION_UPLOAD_DIR%/}/${RELEASE_ID}/"
          fi

